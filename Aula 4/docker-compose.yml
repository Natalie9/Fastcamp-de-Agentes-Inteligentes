services: 
  n8n-youtube:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - ./:/home/node/.n8n
    environment:
      GENERIC_TIMEZONE: "America/Sao_Paulo"
    restart: unless-stopped
    networks:
      - n8n-network-youtube

  minio-youtube:
    image: minio/minio
    ports:
      - "9000:9000"
    volumes:
      - ./minio/data:/data
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: server /data
    restart: unless-stopped
    networks:
      - n8n-network-youtube

networks:
  n8n-network-youtube:
    driver: bridge