services: 
  n8n-youtube:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - ./:/home/node/.n8n
    environment:
      GENERIC_TIMEZONE: "America/Sao_Paulo"
    restart: unless-stopped
    
  waha-n8n:
    image: devlikeapro/waha:latest
    container_name: waha-docker
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_DEFAULT_ENGINE: "NOWEB"
      WHATSAPP_HOOK_EVENTS: "message"
      WHATSAPP_HOOK_URL: "http://host.docker.internal:5678/webhook/04beb95c-50ab-4070-a8d6-76b2a585fc97/waha"
      PUPPETEER_SKIP_DOWNLOAD: "True"
      NODE_OPTIONS: "--max-old-space-size=16384"
      WAHA_GOWS_PATH: "/app/gows"
      WAHA_GOWS_SOCKET: "/tmp/gows.sock"
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "5000"
      WAHA_ZIPPER: "ZIPUNZIP"
      GODEBUG: "netdns=cgo"
    volumes:
      - C:/waha:/tmp
    command: ["/entrypoint.sh"]     

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant 
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    expose:
      - 6333
      - 6334
      - 6335
    volumes:
      - ./qdrant_data:/qdrant/storage
       